name: Test DVC Connection and Pull Files

on: [push, pull_request]

jobs:
  test-dvc-connection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install DVC and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dvc dvc-http

    - name: Configure DVC remote (modify only)
      run: |
        echo "Current DVC remotes:"
        dvc remote list
        
        echo "Modifying existing remote..."
        dvc remote modify origin auth basic
        dvc remote modify origin user ${{ secrets.DAGSHUB_DVC_USER }}
        dvc remote modify origin password ${{ secrets.DAGSHUB_DVC_PASS }}
        
        echo "Updated remote configuration:"
        dvc remote list

    - name: Test connection with remote list
      run: |
        echo "📡 Testing DVC remote configuration..."
        dvc remote list
        echo "✅ DVC remote configured successfully"

    - name: Test with DVC doctor
      run: |
        echo "🏥 Running DVC doctor to check configuration..."
        dvc doctor
        echo "✅ DVC system check completed"