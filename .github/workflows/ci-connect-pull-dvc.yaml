name: Test DVC Connection and Pull Files

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allows manual triggering

jobs:
  test-dvc-connection:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install DVC and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dvc dvc-http

    - name: Configure DVC remote
      run: |
        dvc remote add origin https://dagshub.com/pawarit.jamjod/MLOps_XOXO.dvc
        dvc remote modify origin auth basic
        dvc remote modify origin user ${{ secrets.DAGSHUB_DVC_USER}}
        dvc remote modify origin password ${{ secrets.DAGSHUB_DVC_PASS }}

    - name: Test DVC connection
      run: |
        echo "Testing DVC remote connection..."
        dvc remote list
        dvc fetch --all -v

    - name: Pull DVC files
      run: |
        echo "Pulling DVC files..."
        dvc pull --all -v

    - name: Verify pulled files
      run: |
        echo "Verifying DVC files..."
        dvc status
        find . -name "*.dvc" -exec echo "DVC file: {}" \;
        # Add specific file checks based on your project structure