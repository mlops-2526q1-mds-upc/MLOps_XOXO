name: CI (tests & lint)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and install test/dev dependencies
        run: |
          python -m pip install --upgrade pip
          # install test + lint tooling and minimal runtime deps used by tests
          python -m pip install pytest pytest-mock pytest-cov flake8 pylint tomli numpy pyyaml pandas opencv-python tqdm

      - name: Install project (editable) and CPU PyTorch
        run: |
          python -m pip install --upgrade setuptools wheel
          python -m pip install -e .
          # install CPU-only torch so tests that import torch can be collected
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch

          