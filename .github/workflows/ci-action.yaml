name: CI (tests & lint)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DAGSHUB_USER: ${{ secrets.DAGSHUB_DVC_USER }}
      DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_DVC_PASS }}

    strategy:
      matrix:
        python-version: [3.13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- Dependency Installation (Using uv for speed and pyproject.toml) ---
      - name: Install uv
        run: pip install uv
        
      - name: Install dependencies from pyproject.toml
        run: uv sync

      - name: Install project (editable)
        run: uv pip install -e .
        
      # --- DVC Setup and Configuration ---
      
      - name: Install DVC with DAGsHub support
        run: uv pip install "dvc[dagshub]"

      - name: Initialize DVC (if not already initialized)
        run: |
          # Check if .dvc directory exists, if not initialize
          if [ ! -d ".dvc" ]; then
            dvc init --no-scm
          fi
        shell: bash

      - name: Configure DVC remote with DAGsHub authentication
        env:
          DAGSHUB_USER: ${{ secrets.DAGSHUB_DVC_USER }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_DVC_PASS }}
        run: |
          # Remove existing remote if it exists to avoid conflicts
          dvc remote remove origin || true
          
          # Add remote with proper URL format for DAGsHub
          dvc remote add origin https://dagshub.com/${{ github.repository_owner }}/${{ github.event.repository.name }}.dvc
          
          # Configure authentication
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local user "$DAGSHUB_USER"
          dvc remote modify origin --local password "$DAGSHUB_TOKEN"
          
          # Verify configuration
          dvc remote list
          dvc remote modify origin --list
        shell: bash

      - name: ⬇️ Pull DVC Tracked Files (Models/Data)
        run: |
          dvc pull -v
        shell: bash

      - name: ✨ Run DVC Repro (if dvc.yaml exists)
        run: |
          if [ -f "dvc.yaml" ]; then
            dvc repro -v
          else
            echo "No dvc.yaml found, skipping dvc repro"
          fi
        shell: bash
        
      # --- API Readiness Test ---
      
      - name: 🧪 Validate API Model Loading
        run: |
          python -c "import api.api; print(api.api.get_model_info())"
        shell: bash

      - name: Validate all models load correctly
        run: python -c "import api; api.get_model_info()"

      # --- Run your existing tests ---
      - name: Run unit and integration tests
        run: |
          pytest --cov-report=xml:reports/coverage.xml

      - name: Run linter
        run: |
          flake8 .
          pylint mlops_xoxo/