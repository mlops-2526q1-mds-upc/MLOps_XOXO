name: CI (tests & lint)

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.13]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # --- Dependency Installation (Using uv for speed and pypoject.toml) ---
      - name: Install uv
        run: pip install uv
        
      - name: Install dependencies from pyproject.toml
        # Install all dependencies (including torch) and dev dependencies
        run: |
          uv sync --with dev
          # You might need to install torch with a specific index URL if running into issues, e.g.:
          # uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          # Since you didn't specify, we use the simple uv sync.

      - name: Install project (editable)
        run: uv pip install -e .
        
      # --- DVC Data/Model Loading and API Test ---
      
      - name: Install DVC dependencies (if not in pyproject.toml)
        # Assuming DVC is included in pyproject.toml, but adding as a safety step
        run: uv pip install dvc 

      - name: Configure DVC Credentials (using GitHub Secrets)
        # This step uses the credentials to authenticate with your Dagshub remote
        env:
          DAGSHUB_USER: ${{ secrets.DAGSHUB_DVC_USER }}
          DAGSHUB_PASSWORD: ${{ secrets.DAGSHUB_DVC_PASS }}
        run: |
          dvc remote modify origin user ${DAGSHUB_USER}
          dvc remote modify origin password ${DAGSHUB_PASSWORD}
          # Display config (without credentials) for verification
          dvc remote list --local
          dvc config --local core.ask_password false # Prevent prompts

      - name: Pull DVC tracked files (Data and Models)
        # 'dvc pull' retrieves all files tracked by DVC (including your models in 'models/')
        run: dvc pull -v
        
      - name: Run DVC Repro (Optional: Only if data processing/artifacts are defined in dvc.yaml)
        # If your models/data are generated by pipeline stages, this step re-runs them.
        # If models/data are only committed artifacts, 'dvc pull' is enough.
        # Run this to verify the pipeline logic itself is reproducible.
        run: dvc repro
        
      # --- API Readiness Test ---

      - name: Test API Model Loading
        # The api.py script loads all models on startup.
        # We can run it with a minimal utility like 'python -c' to test the model loading logic.
        # We also need to set the device to 'cpu' since GitHub runners are CPU-only.
        # We use a special test command to just run the script's initialization part.
        run: |
          echo "Checking if api/api.py can run and load all models..."
          python api/api.py --test-mode-load-only
        env:
          # Assuming you can pass an environment variable to force CPU loading
          DEVICE_OVERRIDE: cpu
          # You might need to simulate the execution environment if the script
          # is sensitive to where it is run.
          
      # If the API file doesn't support a simple load-only mode, we can modify the test command.
      # Since your api.py calls sys.exit(1) on failure to load models, simply running the top section is a good test.
      # A simple command that executes the script's setup logic without starting the uvicorn server:
      - name: Validate all models load correctly
        run: python -c "import api; api.get_model_info()"
        # This command imports your api.py script, triggering all model loading,
        # and then calls a simple function to verify no exceptions occurred during setup.

      # --- Run your existing tests ---
      # ... Your original test steps (e.g., pytest) here ...
      - name: Run unit and integration tests
        run: |
          pytest --cov-report=xml:reports/coverage.xml
          # Or your original pytest command

      - name: Run linter
        run: |
          flake8 .
          pylint mlops_xoxo/
          # Or your original linting commands 