name: Combined CI and DVC Tests

on: [push, pull_request]

jobs:
  test-dvc-connection:
    name: Test DVC Connection
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install DVC and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dvc dvc-http

    - name: Configure DVC remote (modify only)
      env:
        DAGSHUB_DVC_USER: ${{ secrets.DAGSHUB_DVC_USER }}
        DAGSHUB_DVC_PASS: ${{ secrets.DAGSHUB_DVC_PASS }}
      run: |
        echo "Current DVC remotes:"
        dvc remote list
        
        echo "Modifying existing remote..."
        dvc remote modify origin auth basic
        dvc remote modify origin user "$DAGSHUB_DVC_USER"
        dvc remote modify origin password "$DAGSHUB_DVC_PASS"
        
        echo "Updated remote configuration:"
        dvc remote list

    - name: Test connection with remote list
      run: |
        echo "📡 Testing DVC remote configuration..."
        dvc remote list
        echo "✅ DVC remote configured successfully"

    - name: Test with DVC doctor
      run: |
        echo "🏥 Running DVC doctor to check configuration..."
        dvc doctor
        echo "✅ DVC system check completed"

  simple-ci-test:
    name: Simple CI Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify imports work
        run: |
          python -c "
          try:
              import torch
              import mlflow
              import dvc
              print('✓ All key dependencies imported successfully')
              print(f'  - PyTorch version: {torch.__version__}')
              print(f'  - MLflow version: {mlflow.__version__}')
              print(f'  - DVC version: {dvc.__version__}')
          except ImportError as e:
              print(f'✗ Dependency import failed: {e}')
              exit(1)
          except Exception as e:
              print(f'✗ Unexpected error: {e}')
              exit(1)
          "

  download-models:
    name: Download Models for Inference
    runs-on: ubuntu-latest
    needs: test-dvc-connection
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install DVC and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dvc dvc-http

    - name: Configure DVC remote
      env:
        DAGSHUB_DVC_USER: ${{ secrets.DAGSHUB_DVC_USER }}
        DAGSHUB_DVC_PASS: ${{ secrets.DAGSHUB_DVC_PASS }}
      run: |
        dvc remote modify origin auth basic
        dvc remote modify origin user "$DAGSHUB_DVC_USER"
        dvc remote modify origin password "$DAGSHUB_DVC_PASS"

    - name: Download specific model files only
      run: |
        echo "📥 Downloading model files for inference testing..."
        dvc fetch models/age_gender/gender_model.pt
        dvc fetch models/age_gender/age_model.pt
        dvc fetch models/emotion_classification/
        dvc fetch models/face_embedding/
        dvc fetch models/fake_classification/
        echo "✅ Model files fetched to DVC cache"

    - name: Pull models to workspace
      run: |
        echo "🔄 Pulling models to workspace..."
        dvc pull models/age_gender/gender_model.pt
        dvc pull models/age_gender/age_model.pt
        dvc pull models/emotion_classification/
        dvc pull models/face_embedding/
        dvc pull models/fake_classification/
        echo "✅ Models pulled to workspace"

    - name: Verify downloaded models
      run: |
        echo "🔍 Verifying downloaded model files..."
        find models/ -type f -name "*.pt" -o -name "*.pth" -o -name "*.h5" | while read file; do
          size=$(du -h "$file" 2>/dev/null | cut -f1 || echo "MISSING")
          echo "📄 $file - $size"
        done