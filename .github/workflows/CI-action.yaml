name: Combined CI and DVC Tests

on: [push, pull_request]

jobs:
  test-dvc-connection:
    name: Test DVC Connection
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install DVC and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dvc dvc-http

    - name: Configure DVC remote (modify only)
      env:
        DAGSHUB_DVC_USER: ${{ secrets.DAGSHUB_DVC_USER }}
        DAGSHUB_DVC_PASS: ${{ secrets.DAGSHUB_DVC_PASS }}
      run: |
        echo "Current DVC remotes:"
        dvc remote list
        
        echo "Modifying existing remote..."
        dvc remote modify origin auth basic
        dvc remote modify origin user "$DAGSHUB_DVC_USER"
        dvc remote modify origin password "$DAGSHUB_DVC_PASS"
        
        echo "Updated remote configuration:"
        dvc remote list

    - name: Test connection with remote list
      run: |
        echo "📡 Testing DVC remote configuration..."
        dvc remote list
        echo "✅ DVC remote configured successfully"

    - name: Test with DVC doctor
      run: |
        echo "🏥 Running DVC doctor to check configuration..."
        dvc doctor
        echo "✅ DVC system check completed"

  simple-ci-test:
    name: Simple CI Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Verify imports work
        run: |
          python -c "
          try:
              import torch
              import mlflow
              import dvc
              print('✓ All key dependencies imported successfully')
              print(f'  - PyTorch version: {torch.__version__}')
              print(f'  - MLflow version: {mlflow.__version__}')
              print(f'  - DVC version: {dvc.__version__}')
          except ImportError as e:
              print(f'✗ Dependency import failed: {e}')
              exit(1)
          except Exception as e:
              print(f'✗ Unexpected error: {e}')
              exit(1)
          "

  download-models:
    name: Download Models for Inference
    runs-on: ubuntu-latest
    needs: test-dvc-connection
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install DVC and dependencies
      run: |
        python -m pip install --upgrade pip
        pip install dvc dvc-http

    - name: Configure DVC remote
      env:
        DAGSHUB_DVC_USER: ${{ secrets.DAGSHUB_DVC_USER }}
        DAGSHUB_DVC_PASS: ${{ secrets.DAGSHUB_DVC_PASS }}
      run: |
        dvc remote modify origin auth basic
        dvc remote modify origin user "$DAGSHUB_DVC_USER"
        dvc remote modify origin password "$DAGSHUB_DVC_PASS"

    - name: Download only best models
      run: |
        echo "📥 Downloading only the best model files..."
        
        # Download only the best models for each pipeline
        dvc fetch models/age_gender/gender_model.pt
        dvc fetch models/age_gender/age_model.pt
        dvc fetch models/emotion_classification/best_model.pth  # Only best, not last
        dvc fetch models/face_embedding/mobilenetv2_arcface_model.pth
        dvc fetch models/fake_classification/model_best.pth     # Only best, not last
        
        echo "✅ Best model files fetched to DVC cache"

    - name: Pull only best models to workspace
      run: |
        echo "🔄 Pulling best models to workspace..."
        
        # Pull only the best models we need for inference
        dvc pull models/age_gender/gender_model.pt
        dvc pull models/age_gender/age_model.pt
        dvc pull models/emotion_classification/best_model.pth   # Only best (43M vs 128M)
        dvc pull models/face_embedding/mobilenetv2_arcface_model.pth
        dvc pull models/fake_classification/model_best.pth      # Only best
        
        echo "✅ Best models pulled to workspace"

    - name: Verify downloaded best models
      run: |
        echo "🔍 Verifying downloaded best model files..."
        
        # Check only the best models we actually downloaded
        models=(
          "models/age_gender/gender_model.pt"
          "models/age_gender/age_model.pt" 
          "models/emotion_classification/best_model.pth"
          "models/face_embedding/mobilenetv2_arcface_model.pth"
          "models/fake_classification/model_best.pth"
        )
        
        total_saved=0
        for model in "${models[@]}"; do
          if [ -f "$model" ]; then
            size=$(du -b "$model" | cut -f1)
            size_mb=$(echo "scale=1; $size / 1024 / 1024" | bc)
            echo "✅ $model - ${size_mb}M"
          else
            echo "❌ $model - MISSING"
            exit 1
          fi
        done
        
        echo "📊 Summary: Downloaded 5 best models (skipped last_model.pth and model_last.pth)"
        echo "💾 Saved: ~85M by skipping emotion last_model.pth (128M → 43M)"

  download-data:
    name: Download Processed Data
    runs-on: ubuntu-latest
    needs: test-dvc-connection
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python and DVC
      run: |
        pip install dvc dvc-http

    - name: Configure DVC
      env:
        DAGSHUB_DVC_USER: ${{ secrets.DAGSHUB_DVC_USER }}
        DAGSHUB_DVC_PASS: ${{ secrets.DAGSHUB_DVC_PASS }}
      run: |
        dvc remote modify origin auth basic
        dvc remote modify origin user "$DAGSHUB_DVC_USER"
        dvc remote modify origin password "$DAGSHUB_DVC_PASS"

    - name: Download processed data for inference
      run: |
        echo "📥 Downloading processed data files..."
        
        # Download processed data (ready for inference)
        dvc pull data/processed/age_gender/splits/
        dvc pull data/processed/emotion_classification/
        dvc pull data/processed/face_embedding/
        dvc pull data/processed/fake_classification/
        
        echo "✅ Processed data downloaded"

    - name: Verify data structure
      run: |
        echo "🔍 Verifying data directory structure..."
        
        data_paths=(
          "data/processed/age_gender/splits"
          "data/processed/emotion_classification"
          "data/processed/face_embedding" 
          "data/processed/fake_classification"
        )
        
        all_good=true
        for path in "${data_paths[@]}"; do
          if [ -d "$path" ]; then
            files=$(find "$path" -name "*.csv" -o -name "*.json" -o -name "*.txt" 2>/dev/null | wc -l)
            size=$(du -sh "$path" 2>/dev/null | cut -f1 || echo "0")
            echo "✅ $path - ${files} data files - ${size}"
          else
            echo "⚠️  $path - Directory missing (may be expected)"
            all_good=false
          fi
        done
        
        if $all_good; then
          echo "🎉 All data directories present!"
        else
          echo "ℹ️  Some data directories missing (this may be normal for your project)"
        fi